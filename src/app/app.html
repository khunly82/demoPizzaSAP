
<div>
  <p-button label="Ajouter un nouvelle pizza"></p-button>
  <p-table [value]="pizzas.value()!">
    <ng-template #header>
      <tr>
        <th>Id</th>
        <th>Nom</th>
        <th>Prix</th>
        <th>Image</th>
      </tr>
    </ng-template>
    <ng-template #body let-item>
      <tr>
        <td>{{item.id}}</td>
        <td>{{item.name}}</td>
        <td>{{item.price}}€</td>
        <td>
          @if(item.imageUrl) {
            <img height="50" [src]="environment.baseUrl + item.imageUrl">
          }
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>


<p-toast />
